name: Build APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        # Версия должна совпадать с локальной (см. AGENTS.md): проект использует
        # API Flutter 3.27+ (Color.withValues / Color.toARGB32 / CardThemeData),
        # которых нет в 3.24.x — на них и падала сборка.
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          sed -i '/dependency_overrides:/,+1d' pubspec.yaml
          flutter pub get

      - name: Generate App Icon
        working-directory: ./frontend
        run: dart run flutter_launcher_icons

      - name: Build APK
        working-directory: ./frontend
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citavuk-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
