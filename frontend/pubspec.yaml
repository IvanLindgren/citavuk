name: srbski_read
description: "Читавук — сербская читалка с разбором слов, грамматикой и карточками."
publish_to: 'none'

version: 1.3.0+14

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^25.1.37
  archive: ^3.6.1
  xml: ^6.5.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  # БД в вебе (sqlite3 wasm + IndexedDB).
  sqflite_common_ffi_web: ^0.4.0
  # Версия sqlite3 ЗАФИКСИРОВАНА под web/sqlite3.wasm (релиз sqlite3-3.3.2).
  # Если меняешь её — обнови и web/sqlite3.wasm с того же релиза, иначе на вебе
  # будет «WebAssembly.instantiate: Import env» (несовпадение ABI).
  sqlite3: 3.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  # Windows/Android. После добавления: flutter clean + flutter pub get.
  audioplayers: ^6.1.0
  url_launcher: ^6.3.0

# path_provider_android 2.3.x тянет нативный плагин `jni`, который ломает сборку
# под Windows. Закрепляем на 2.2.x (без jni); на Android работает штатно.
dependency_overrides:
  path_provider_android: '>=2.2.0 <2.3.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  inno_bundle: ^0.4.0

flutter_launcher_icons:
  image_path: "assets/imgs/citavuk_icon.png"
  android: true
  ios: false
  web:
    generate: true
    background_color: "#F3E9D2"
    theme_color: "#9E2B25"
  windows:
    generate: true
    icon_size: 256


flutter:
  uses-material-design: true

  assets:
    - assets/lexicon.db
    - assets/test_story.docx
    - assets/test_story.pdf
    - assets/library/
    - assets/imgs/

  fonts:
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700

inno_bundle:
  id: a2cc5770-60d4-11f1-bfd5-31efbcab4b3e
  name: Citavuk
  version: 1.3.0
  publisher: Denis Kornilov
  languages:
    - english
    - russian
  executable: build/windows/x64/runner/Release/Citavuk.exe
  icon: assets/imgs/citavuk_icon.png
